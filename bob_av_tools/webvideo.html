<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BOB NEXUS | OVERLAY</title>
  <!-- Using local libraries for offline high-fidelity rendering -->
  <script src="vendor/marked.min.js"></script>
  <link rel="stylesheet" href="vendor/atom-one-dark.min.css">
  <script src="vendor/highlight.min.js"></script>
  <style>
    /* MASTERMIND NEXUS THEME: UNDERGROUND / HACKER SZENE */
    :root {
      --accent-color: #008b8b;
      --accent-glow: rgba(0, 139, 139, 0.4);
      --bg-dark: #0a0a0a;
      --text-gray: #dcdcdc;
      --text-dim: #bbb;

      /* Layout Customization */
      --root-padding: 20px;
      --content-padding: 20px;
      --content-bg: rgba(0, 0, 0, 0.3);
      --content-border-left: 2px solid var(--accent-color);
      --line-height: 1.4;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-gray);
      font-family: 'Courier New', Courier, monospace;
      margin: 0;
      padding: 0;
      overflow: hidden;
      line-height: 1.4;
      background-image: radial-gradient(rgba(18, 18, 18, 0.75), rgba(0, 0, 0, 0.9));
    }

    /* SCANLINES EFFECT */
    body::before {
      content: " ";
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
      z-index: 9999;
      background-size: 100% 3px, 3px 100%;
      pointer-events: none;
    }

    #root-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      width: 100vw;
      box-sizing: border-box;
      padding: var(--root-padding);
    }

    /* ONLY THE CONTENT AREA STYLE */
    #content-area {
      flex: 1;
      font-size: 1.3rem;
      /* Larger for video visibility */
      color: var(--text-dim);
      padding: var(--content-padding);
      overflow-y: auto;
      scrollbar-width: none;
      background: var(--content-bg);
      border-left: var(--content-border-left);
      line-height: var(--line-height);
    }

    #content-area::-webkit-scrollbar {
      display: none;
    }

    /* MARKDOWN STYLING - PORTED FROM SCREENSHOT */
    #content-area h1,
    #content-area h2,
    #content-area h3 {
      color: var(--accent-color);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 1.5rem;
      margin-bottom: 1rem;
      text-shadow: 0 0 5px var(--accent-color);
    }

    #content-area h1 {
      font-size: 1.6rem;
      font-weight: 900;
    }

    #content-area h2 {
      font-size: 1.4rem;
      font-weight: 800;
    }

    #content-area p:last-child {
      margin-bottom: 0;
    }

    #content-area ul,
    #content-area ol {
      margin: 1.2rem 0;
      padding-left: 2rem;
    }

    #content-area li {
      margin-bottom: 0.6rem;
    }

    #content-area blockquote {
      border-left: 4px solid #444;
      margin: 1.5rem 0;
      padding: 10px 20px;
      color: #888;
      font-style: italic;
      background: rgba(255, 255, 255, 0.02);
    }

    #content-area code {
      background: #121212;
      padding: 2px 4px;
      font-size: 1rem;
      border-radius: 2px;
      font-family: 'Courier New', Courier, monospace;
    }

    /* Block code overrides */
    #content-area pre code {
      display: block;
      background: transparent !important;
      padding: 0 !important;
      border-radius: 0;
    }

    #content-area table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
      background: rgba(255, 255, 255, 0.01);
    }

    #content-area th {
      border-bottom: 2px solid var(--accent-color);
      color: var(--accent-color);
      text-align: left;
      padding: 12px;
      font-weight: 900;
    }

    #content-area td {
      border-bottom: 1px solid #222;
      padding: 10px;
    }

    /* CURSOR */
    .cursor {
      display: inline-block;
      width: 12px;
      height: 1.4rem;
      background-color: var(--accent-color);
      margin-left: 8px;
      vertical-align: middle;
      animation: blinker 0.8s step-end infinite;
    }

    @keyframes blinker {
      50% {
        opacity: 0;
      }
    }

    div.reasoning-block {
      background: rgba(0, 50, 50, 0.4);
      padding: 8px 12px;
      margin: 10px 0;
      font-size: 1rem;
      color: var(--text-dim);
      font-style: italic;
      position: relative;
    }

    div.reasoning-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 5px;
      font-style: normal;
      font-weight: bold;
    }

    div.reasoning-header span {
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: var(--accent-color);
    }

    .collapse-btn {
      background: transparent;
      border: 1px solid var(--accent-color);
      color: var(--accent-color);
      font-size: 0.8rem;
      cursor: pointer;
      padding: 0 5px;
      line-height: normal;
      border-radius: 2px;
      opacity: 0.6;
      transition: opacity 0.2s;
    }

    .collapse-btn:hover {
      opacity: 1;
    }

    div.reasoning-block.collapsed .reasoning-content {
      display: none;
    }

    #content-area pre {
      background: #121212;
      border: none;
      padding: 10px;
      margin: 0;
      font-size: 0.9rem;
      white-space: pre-wrap;
      word-break: break-all;
      border-radius: 0;
    }
  </style>
</head>

<body>
  <div id="root-container">
    <!-- Concentrating on the Mastermind Chronicles view -->
    <div id="content-area">
      <!-- Content will be injected here via ROS -->
    </div>
  </div>

  <script>
    const contentArea = document.getElementById('content-area');
    let currentAIBlock = null;
    let currentContent = "";
    let currentReasoningBlock = null;
    let currentReasoningContent = "";
    let isReasoningCollapsed = false;

    const urlParams = new URLSearchParams(window.location.search);
    const maxTextLength = parseInt(urlParams.get('max_text_length')) || 0;

    // --- MARKED RENDERER CONFIG ---
    const internalRenderer = new marked.Renderer();
    const getVal = (val, field) => {
      if (!val) return "";
      if (typeof val === 'string') return val;
      if (typeof val === 'object') return val[field] || val.text || val.raw || JSON.stringify(val);
      return String(val);
    };
    internalRenderer.code = function (a, b) {
      const codeVal = getVal(a, 'text');
      const langVal = getVal(b, 'lang');
      let highlighted = codeVal;
      let language = null;
      if (window.hljs) {
        try {
          language = (langVal && hljs.getLanguage(langVal)) ? langVal : null;
          highlighted = language ? hljs.highlight(codeVal, { language }).value : hljs.highlightAuto(codeVal).value;
        } catch (e) { highlighted = codeVal; }
      }
      return `<pre><code class="hljs ${language ? 'language-' + language : ''}">${highlighted}</code></pre>`;
    };
    internalRenderer.codespan = function (tokenOrText) {
      const text = getVal(tokenOrText, 'text');
      let highlighted = text;
      if (window.hljs) {
        try { highlighted = hljs.highlightAuto(text).value; } catch (e) { }
      }
      return `<code class="hljs">${highlighted}</code>`;
    };
    marked.setOptions({ renderer: internalRenderer, gfm: true, breaks: true });

    const createAIBlock = () => {
      const div = document.createElement('div');
      div.className = 'ai-response-block';
      contentArea.appendChild(div);
      currentAIBlock = div;
      currentContent = ""; 
      currentReasoningBlock = null;
      currentReasoningContent = "";
    };

    window.toggleReasoning = (block) => {
      if (block) {
        block.classList.toggle('collapsed');
        const btn = block.querySelector('.collapse-btn');
        if (btn) btn.innerText = block.classList.contains('collapsed') ? '▼' : '▲';
      }
    };

    window.appendStream = (chunk) => {
      if (!currentAIBlock) createAIBlock();
      currentContent += chunk;

      // Optional pruning for long sessions
      if (maxTextLength > 0 && currentContent.length > maxTextLength) {
          currentContent = currentContent.slice(-maxTextLength);
          const entries = contentArea.querySelectorAll('.ai-response-block, .reasoning-block');
          if (entries.length > 15) {
              for(let i=0; i<3; i++) entries[i]?.remove();
          }
      }

      if (window.marked && currentAIBlock) {
        currentAIBlock.innerHTML = marked.parse(currentContent);
        contentArea.scrollTo({ top: contentArea.scrollHeight, behavior: 'instant' });
      }
    };

    window.createNewTurn = () => {
        createAIBlock();
    };

    window.appendReasoning = (chunk) => {
        if (!currentReasoningBlock) {
            currentReasoningBlock = document.createElement('div');
            currentReasoningBlock.className = 'reasoning-block';
            
            const header = document.createElement('div');
            header.className = 'reasoning-header';
            header.innerHTML = `<span>THOUGHTS</span><button class="collapse-btn">▲</button>`;
            
            const btn = header.querySelector('.collapse-btn');
            btn.onclick = (e) => {
                e.stopPropagation();
                currentReasoningBlock.classList.toggle('collapsed');
                btn.innerText = currentReasoningBlock.classList.contains('collapsed') ? '▼' : '▲';
            };
            
            const rContent = document.createElement('div');
            rContent.className = 'reasoning-content';
            
            currentReasoningBlock.appendChild(header);
            currentReasoningBlock.appendChild(rContent);

            if (currentAIBlock) {
                contentArea.insertBefore(currentReasoningBlock, currentAIBlock);
            } else {
                contentArea.appendChild(currentReasoningBlock);
            }
            currentReasoningContent = "";
        }
        
        currentReasoningContent += chunk;
        if (window.marked) {
            const rContent = currentReasoningBlock.querySelector('.reasoning-content');
            rContent.innerHTML = marked.parse(currentReasoningContent);
            contentArea.scrollTo({ top: contentArea.scrollHeight, behavior: 'instant' });
        }
    };

    window.updateContent = (fullText) => {
        // Compatibility: Clear everything and render as one block
        contentArea.innerHTML = "";
        createAIBlock();
        currentContent = fullText;
        currentAIBlock.innerHTML = marked.parse(currentContent);
        contentArea.scrollTo({ top: contentArea.scrollHeight, behavior: 'instant' });
    };

  </script>
</body>

</html>
